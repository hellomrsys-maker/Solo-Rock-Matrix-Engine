apiVersion: v1
kind: ConfigMap
metadata:
  name: solo-rock-config
  namespace: default
  labels:
    app: solo-rock
data:
  config.yaml: |
    # SOLO ROCK Configuration for Kubernetes Deployment
    # Thresholds and decision engine settings

    thermal:
      # Temperature thresholds (Celsius)
      warning_celsius: 80        # Issue warning, prepare THROTTLE
      critical_celsius: 90       # Trigger EMERGENCY mode
      throttle_threshold: 75     # Start pacing earlier if trending hot

    cpu:
      # CPU load thresholds (percent)
      load_high_percent: 85      # Trigger BATCH/THROTTLE
      load_critical_percent: 95  # Trigger EMERGENCY

    ram:
      # RAM usage thresholds (percent)
      critical_percent: 97       # Very high, usually triggers EMERGENCY

    decisions:
      # Decision engine tuning
      batch_threshold: 4         # Coalesce this many submissions in BATCH mode
      throttle_pacing_ms: 50     # Delay (ms) between submissions in THROTTLE mode
      emergency_hold_ms: 100     # Hold submissions this long in EMERGENCY mode

    # Alert Configuration
    alerting:
      enabled: true
      backends:
        # Email alerting (requires Kubernetes Secret)
        # - type: email
        #   smtp_server: "smtp.gmail.com"
        #   smtp_port: 587
        #   use_tls: true
        #   sender: "alerts@example.com"
        #   recipients:
        #     - "ops@example.com"
        #   username: ${SOLO_ROCK_EMAIL_USER}
        #   password: ${SOLO_ROCK_EMAIL_PASS}

        # Slack alerting (requires Secret)
        # - type: slack
        #   webhook_url: ${SOLO_ROCK_SLACK_WEBHOOK}
        #   channel: "#alerts"

        # Webhook alerting (for custom monitoring systems)
        # - type: webhook
        #   url: "https://monitoring.example.com/alerts"
        #   headers:
        #     Authorization: "Bearer ${MONITORING_API_TOKEN}"
