apiVersion: v1
kind: Service
metadata:
  name: solo-rock
  namespace: default
  labels:
    app: solo-rock
  annotations:
    description: "SOLO ROCK Hardware Orchestrator internal service"
spec:
  type: ClusterIP
  selector:
    app: solo-rock
  ports:
  - name: http
    port: 8080
    targetPort: 8080
    protocol: TCP
  sessionAffinity: None

---
# Optional: Ingress for external access (if running dashboard)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: solo-rock
  namespace: default
  labels:
    app: solo-rock
spec:
  podSelector:
    matchLabels:
      app: solo-rock
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: monitoring
    - podSelector:
        matchLabels:
          app: prometheus
    ports:
    - protocol: TCP
      port: 8080
  - from:
    - podSelector:
        matchLabels:
          app: solo-rock
    ports:
    - protocol: TCP
      port: 8080
  egress:
  # Allow DNS
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: UDP
      port: 53
  # Allow outbound to any (for SMTP, webhooks, etc.)
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 25
    - protocol: TCP
      port: 587
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 80
  # Allow inter-pod communication
  - to:
    - podSelector:
        matchLabels:
          app: solo-rock
    ports:
    - protocol: TCP
      port: 8080
